version: "3.8"

# Dùng file này nếu bạn muốn dùng image có sẵn từ Docker Hub
# thay vì build từ source code.
#
# Cách dùng:
#   1. Tải file này và .env.example về cùng thư mục
#   2. Sao chép .env.example thành .env và điền thông tin
#   3. docker compose -f docker-compose.hub.yml up -d

services:
  nginx:
    image: buitanviet/chat-quality-agent-nginx:latest
    container_name: cqa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - LEGO_DOMAIN=${LEGO_DOMAIN:-}
      - LEGO_EMAIL=${LEGO_EMAIL:-}
    volumes:
      - lego_certs:/etc/lego
      - lego_webroot:/var/www/acme
    depends_on:
      - app

  app:
    image: buitanviet/chat-quality-agent:latest
    container_name: cqa-app
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - file_storage:/var/lib/cqa/files
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:15-alpine
    container_name: cqa-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cqa}
      POSTGRES_USER: ${DB_USER:-cqa}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-cqa}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  file_storage:
  lego_certs:
  lego_webroot:
