version: "3.8"

services:
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    container_name: cqa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - LEGO_DOMAIN=${LEGO_DOMAIN:-}
      - LEGO_EMAIL=${LEGO_EMAIL:-}
    volumes:
      - lego_certs:/etc/lego
      - lego_webroot:/var/www/acme
    depends_on:
      - app

  app:
    build: .
    container_name: cqa-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - file_storage:/var/lib/cqa/files
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:15-alpine
    container_name: cqa-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cqa}
      POSTGRES_USER: ${DB_USER:-cqa}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-cqa}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  file_storage:
  lego_certs:
  lego_webroot:
